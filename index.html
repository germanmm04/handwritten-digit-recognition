<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Reconocimiento de Dígitos (CNN Keras 32x32 + ONNX)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f172a;
        --card: #020617;
        --accent: #22c55e;
        --accent-soft: rgba(34, 197, 94, 0.12);
        --border: #1f2937;
        --text: #e5e7eb;
        --text-muted: #9ca3af;
        --danger: #ef4444;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at top, #111827 0, #020617 45%, #000 100%);
        color: var(--text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
          "Segoe UI", sans-serif;
      }

      .card {
        background: radial-gradient(circle at top left, #020617 0, #020617 40%, #020617 100%);
        border-radius: 24px;
        padding: 24px 28px 20px;
        box-shadow:
          0 24px 80px rgba(0, 0, 0, 0.85),
          0 0 0 1px rgba(15, 23, 42, 0.9);
        max-width: 480px;
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      @media (max-width: 800px) {
        .card {
          border-radius: 0;
          min-height: 100vh;
          box-shadow: none;
        }
      }

      h1 {
        font-size: 1.4rem;
        margin: 0 0 4px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .pill {
        font-size: 0.7rem;
        padding: 2px 8px;
        border-radius: 999px;
        background: linear-gradient(90deg, #22c55e33, #06b6d433);
        color: #a5f3fc;
        border: 1px solid rgba(45, 212, 191, 0.4);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      p.subtitle {
        margin: 0;
        font-size: 0.85rem;
        color: var(--text-muted);
      }

      .canvas-wrapper {
        margin-top: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      #drawCanvas {
        border-radius: 18px;
        background: radial-gradient(circle at top, #0b1120 0, #020617 60%, #000 100%);
        border: 1px solid var(--border);
        box-shadow:
          inset 0 0 0 1px rgba(15, 23, 42, 0.9),
          0 14px 40px rgba(0, 0, 0, 0.7);
        cursor: crosshair;
        touch-action: none;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      button {
        border-radius: 999px;
        border: 1px solid transparent;
        padding: 7px 14px;
        font-size: 0.85rem;
        cursor: pointer;
        font-weight: 500;
        background: #111827;
        color: var(--text);
        display: inline-flex;
        align-items: center;
        gap: 6px;
        transition:
          background 0.15s ease,
          border-color 0.15s ease,
          transform 0.05s ease,
          box-shadow 0.15s ease;
      }

      button.primary {
        background: radial-gradient(circle at top left, #22c55e, #16a34a);
        border-color: rgba(34, 197, 94, 0.7);
        color: #022c22;
        box-shadow: 0 12px 35px rgba(22, 163, 74, 0.5);
      }

      button.primary:hover {
        background: radial-gradient(circle at top left, #4ade80, #22c55e);
        transform: translateY(-1px);
        box-shadow: 0 16px 45px rgba(22, 163, 74, 0.65);
      }

      button.secondary {
        border-color: rgba(148, 163, 184, 0.5);
      }

      button.secondary:hover {
        background: #020617;
        border-color: rgba(148, 163, 184, 0.8);
      }

      button:active {
        transform: translateY(0);
        box-shadow: none;
      }

      button:disabled {
        opacity: 0.5;
        cursor: default;
        box-shadow: none;
      }

      .prediction-box {
        margin-top: 10px;
        padding: 10px 12px;
        border-radius: 14px;
        border: 1px solid rgba(55, 65, 81, 0.9);
        background: radial-gradient(circle at top left, #020617 0, #020617 60%, #020617 100%);
        display: flex;
        flex-direction: column;
        gap: 4px;
        font-size: 0.86rem;
      }

      .prediction-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 8px;
      }

      .prediction-label {
        color: var(--text-muted);
      }

      .prediction-digit {
        font-size: 2.2rem;
        font-weight: 700;
        letter-spacing: 0.1em;
      }

      .status-text {
        font-size: 0.78rem;
        color: var(--text-muted);
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div style="display: flex; flex-direction: column; gap: 10px">
        <h1>
          Reconocimiento de dígitos
          <span class="pill">Keras · ONNX · 32x32</span>
        </h1>
        <p class="subtitle">
          Dibuja un número (0–9) y pulsa “Predecir dígito”.
        </p>
      </div>

      <div class="canvas-wrapper">
        <canvas id="drawCanvas" width="280" height="280"></canvas>

        <div class="controls">
          <button id="clearBtn" class="secondary">Borrar</button>
          <button id="predictBtn" class="primary">Predecir dígito</button>
        </div>
      </div>

      <div class="prediction-box">
        <div class="prediction-row">
          <span class="prediction-label">Predicción</span>
          <span id="predictionDigit" class="prediction-digit">?</span>
        </div>
        <div id="modelStatus" class="status-text">
          Cargando modelo ONNX…
        </div>
      </div>
    </div>

    <!-- onnxruntime-web desde CDN -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.18.0/dist/ort.min.js"></script>
    <script src="./main.js"></script>
  </body>
</html>
